---
apiVersion: v1
kind: Service
metadata:
  name: polaris
  namespace: data-platform
  labels:
    app.kubernetes.io/name: polaris
    app.kubernetes.io/component: catalog
    app.kubernetes.io/part-of: open-lakehouse-lab
    open-lakehouse-lab/stage: "04"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: polaris
    app.kubernetes.io/component: catalog
  ports:
    - name: catalog-api
      port: 8181
      targetPort: catalog-api
      protocol: TCP
    - name: management
      port: 8182
      targetPort: management
      protocol: TCP
